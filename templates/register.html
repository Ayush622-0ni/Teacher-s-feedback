<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration | Teacher Feedback</title>

    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Inter", "Segoe UI", Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;

            /* ===== WATERMARK BACKGROUND ===== */
            background:
                linear-gradient(
                    135deg,
                    rgba(30, 60, 114, 0.88),
                    rgba(42, 82, 152, 0.88)
                ),
                url("/static/images/group photo.jpeg");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* ===== FORM CARD ===== */
        .form-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: 18px;

            /* Glassmorphism */
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);

            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .form-container h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
            color: #1e3c72;
        }

        .form-container p {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-bottom: 30px;
        }

        /* ===== INPUT GROUP ===== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        /* ===== BUTTON ===== */
        .btn {
            width: 100%;
            padding: 13px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;

            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;

            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.4);
        }

        /* ===== FOOTER TEXT ===== */
        .footer-text {
            text-align: center;
            margin-top: 22px;
            font-size: 13px;
            color: #6b7280;
        }

    </style>
</head>

<body>

<div class="form-container">
    <h2>Student Registration</h2>
    <p>Please register yourself before giving feedback</p>

    <form action="/feedback" method="post">

        <div class="form-group">
            <label>Student Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="example@gmail.com" required>
        </div>

        <div class="form-group">
            <label>Course</label>
            <select name="course" required>
                <option value="">Select Course</option>
                <option>BCA</option>
                <option>B.Tech</option>
                <option>B.Sc</option>
                <option>B.Com</option>
                <option>MCA</option>
                <option>M.Tech</option>
            </select>
        </div>

        <div class="form-group">
            <label>Branch</label>
            <select name="branch" required>
                <option value="">Select Branch</option>
                <option>Computer Science</option>
                <option>Information Technology</option>
                <option>Mechanical</option>
                <option>Civil</option>
                <option>Electrical</option>
                <option>Electronics</option>
            </select>
        </div>

        <button class="btn" type="submit">Register</button>
    </form>

    <div class="footer-text">
        © 2026 Teacher Feedback System
    </div>
</div>

</body>
</html>
