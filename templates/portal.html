<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beautiful Table</title>

    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(120deg, #74ebd5, #9face6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== TABLE OUTER CONTAINER ===== */
        .table-container {
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);

            width: 95%;          /* 🔴 CHANGE WIDTH HERE */
            max-width: 1300px;   /* 🔴 INCREASE / DECREASE MAX SIZE HERE */

            overflow-x: auto;    /* 🔴 ENABLE SCROLL IF TABLE IS BIG */
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;         /* 🔴 KEEP THIS 100% */
            min-width: 1000px;   /* 🔴 CHANGE THIS IF COLUMNS ARE STILL TIGHT */
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        thead {
            background: #4a6cf7;
            color: white;
        }

        th, td {
            padding: 26px 25px;  /* 🔴 INCREASE PADDING FOR MORE SPACE */
            text-align: center;
            font-size: 12px;     /* 🔴 CHANGE FONT SIZE HERE */
        }

        th {
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        tbody tr {
            border-bottom: 1px solid #eaeaea;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:hover {
            background-color: #eef3ff;
            transition: 0.3s;
        }

        /* ===== FEEDBACK COLUMN (LONG TEXT) ===== */
        td:last-child {
            max-width: 350px;    /* 🔴 CHANGE WIDTH OF FEEDBACK COLUMN */
            word-wrap: break-word;
        }

    </style>
</head>

<body>

<div class="table-container">
    <h2>Student's Feedback </h2>

    <table>
        <thead>
            <tr>
                <th>Teacher Name</th>
                <th>Subject</th>
                <th>Rating</th>
                <th>Teaching Quality</th>
                <th>Communication Skill</th>
                <th>Punctuality</th>
                <th>Feedback</th>
            </tr>
        </thead>

        <tbody>
            {% for n in himan %}
            <tr>
                <td>{{ n[0] }}</td>
                <td>{{ n[1] }}</td>
                <td>{{ n[2] }}</td>
                <td>{{ n[3] }}</td>
                <td>{{ n[4] }}</td>
                <td>{{ n[5] }}</td>
                <td>{{ n[6] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
